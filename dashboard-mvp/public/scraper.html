<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网页抓取 - ClawLabs</title>
<style>
  :root { --primary: #2563eb; --primary-hover: #1d4ed8; --success: #16a34a; --danger: #dc2626; --border: #e5e7eb; --bg-secondary: #f9fafb; --text: #111827; --text-secondary: #6b7280; --radius: 8px; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; background: #f3f4f6; color: var(--text); }

  .page { max-width: 1000px; margin: 0 auto; padding: 24px 20px; }
  .back { display: inline-flex; align-items: center; gap: 4px; color: var(--text-secondary); text-decoration: none; font-size: 13px; margin-bottom: 12px; }
  .back:hover { color: var(--primary); }

  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .header h1 { font-size: 24px; font-weight: 700; }
  .quota-bar { display: flex; gap: 12px; font-size: 12px; color: var(--text-secondary); background: #fff; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); }
  .quota-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }
  .quota-dot.fc { background: #3b82f6; }
  .quota-dot.tv { background: #f59e0b; }

  .card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }

  .input-row { display: flex; gap: 8px; }
  .input-row input { flex: 1; padding: 11px 14px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; outline: none; transition: border-color .2s; }
  .input-row input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 20px; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; transition: all .15s; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-outline { background: #fff; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { background: var(--bg-secondary); }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { background: #15803d; }

  .options { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 12px; font-size: 13px; }
  .options label { color: var(--text-secondary); white-space: nowrap; }
  .options input[type="text"] { padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; min-width: 160px; flex: 1; }
  .options select { padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: #fff; }

  details { margin-top: 10px; }
  details summary { font-size: 12px; color: var(--primary); cursor: pointer; list-style: none; user-select: none; }
  details summary::before { content: '▶ '; font-size: 10px; }
  details[open] summary::before { content: '▼ '; }
  details textarea { width: 100%; margin-top: 6px; border: 1px solid var(--border); border-radius: 6px; padding: 8px; font-size: 12px; font-family: monospace; resize: vertical; max-height: 80px; }

  .alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 12px; display: none; }
  .alert.show { display: flex; align-items: center; gap: 8px; }
  .alert-loading { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
  .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
  .alert-error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

  .result { display: none; }
  .result.show { display: block; }

  .tab-bar { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 0; }
  .tab-btn { padding: 10px 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--text-secondary); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .15s; }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
  .tab-btn:hover { color: var(--text); }

  .preview { border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius) var(--radius); padding: 24px; background: #fff; min-height: 200px; max-height: 65vh; overflow-y: auto; line-height: 1.8; font-size: 15px; }
  .preview.source { font-family: 'SF Mono', Monaco, monospace; font-size: 13px; white-space: pre-wrap; word-break: break-all; color: #555; line-height: 1.5; }
  .preview img { max-width: 100%; border-radius: 6px; margin: 12px 0; }
  .preview h1, .preview h2, .preview h3 { margin: 20px 0 8px; }
  .preview p { margin: 8px 0; }
  .preview ul, .preview ol { padding-left: 24px; }
  .preview blockquote { border-left: 3px solid var(--border); padding-left: 14px; color: var(--text-secondary); margin: 10px 0; }
  .preview table { border-collapse: collapse; width: 100%; margin: 12px 0; }
  .preview th, .preview td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  .preview code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  .preview pre { background: #f8fafc; padding: 16px; border-radius: 6px; overflow-x: auto; }
  .preview pre code { background: none; padding: 0; }

  .toolbar { display: flex; gap: 8px; padding: 12px 0; align-items: center; flex-wrap: wrap; }
  .toolbar .meta { margin-left: auto; font-size: 12px; color: var(--text-secondary); }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    .options { flex-direction: column; align-items: stretch; }
    .toolbar { flex-direction: column; align-items: stretch; }
    .toolbar .meta { margin-left: 0; text-align: right; }
  }
</style>
</head>
<body>
<div class="page">
  <a href="/" class="back">&larr; 返回</a>

  <div class="header">
    <h1>网页抓取</h1>
    <div class="quota-bar" id="quotaBar">
      <span><span class="quota-dot fc"></span>Firecrawl: <span id="qFC">-</span></span>
      <span><span class="quota-dot tv"></span>Tavily: <span id="qTV">-</span></span>
    </div>
  </div>

  <div class="card">
    <div class="input-row">
      <input type="url" id="urlInput" placeholder="输入网页地址（飞书、公众号、任意公开页面）" autofocus />
      <button class="btn btn-primary" id="scrapeBtn" onclick="scrape()">抓取</button>
    </div>
    <div class="options">
      <label>保存至</label>
      <input type="text" id="saveDirInput" value="~/.openclaw/docs/" />
      <label>格式</label>
      <select id="saveFormat">
        <option value="html">HTML 含图片</option>
        <option value="md">Markdown</option>
      </select>
    </div>
    <details>
      <summary>高级选项（Cookie）</summary>
      <textarea id="cookieInput" rows="2" placeholder="粘贴 Cookie — 用于需要登录的页面（F12 → Network → Request Headers → Cookie）"></textarea>
    </details>
  </div>

  <div class="alert" id="status"></div>

  <div class="result" id="result">
    <div class="card" style="padding:0;">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('preview',this)">渲染预览</button>
        <button class="tab-btn" onclick="switchTab('source',this)">Markdown</button>
      </div>
      <div class="preview" id="previewArea"></div>
    </div>
    <div class="toolbar">
      <button class="btn btn-outline" onclick="copyMd()">复制</button>
      <button class="btn btn-success" id="saveBtn" onclick="saveToServer()">保存到服务器</button>
      <button class="btn btn-outline" onclick="downloadLocal()">下载到本地</button>
      <span class="meta" id="meta"></span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
let D = null, tab = 'preview', timers = [];

const $ = id => document.getElementById(id);
const show = (msg, type) => { const el=$('status'); el.innerHTML=msg; el.className='alert alert-'+type+' show'; };
const hide = () => $('status').className = 'alert';

function engine(url) { return /mp\.weixin\.qq\.com/.test(url) ? 'Tavily' : 'Firecrawl'; }

function progress(name) {
  timers.forEach(clearTimeout); timers = [];
  const steps = [
    [0, `<span class="spinner"></span> 连接 ${name}...`],
    [2e3, `<span class="spinner"></span> 等待页面渲染...`],
    [5e3, `<span class="spinner"></span> 提取内容转 Markdown...`],
    [10e3, `<span class="spinner"></span> 仍在处理，请稍候...`],
    [20e3, `<span class="spinner"></span> 大文章需要更多时间...`],
  ];
  steps.forEach(([t,m]) => timers.push(setTimeout(()=>show(m,'loading'),t)));
}

async function api(path, body) {
  const r = await fetch(path, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const t = await r.text();
  let d; try { d = JSON.parse(t); } catch { throw new Error('解析失败'); }
  if (!r.ok) throw new Error(d.error || '请求失败');
  return d;
}

async function loadQuota() {
  try {
    const d = await (await fetch('/api/scraper/quota')).json();
    if (d.firecrawl) $('qFC').textContent = d.firecrawl;
    if (d.tavily) $('qTV').textContent = d.tavily;
  } catch {}
}

async function scrape() {
  const url = $('urlInput').value.trim();
  if (!url || !/^https?:\/\/.+/.test(url)) return show('请输入有效网址','error');
  const btn = $('scrapeBtn');
  btn.disabled = true; btn.textContent = '抓取中...';
  $('result').classList.remove('show');
  progress(engine(url));

  try {
    const cookie = $('cookieInput').value.trim();
    const d = await api('/api/scraper/scrape', cookie ? {url,cookie} : {url});
    timers.forEach(clearTimeout);

    const now = new Date().toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    d.markdown = `> 原文: [${d.title}](${url})  \n> 时间: ${now}\n\n${d.markdown}`;
    D = d;

    const eng = d.engine==='tavily'?'Tavily':'Firecrawl';
    let s = `抓取成功 — ${d.title}（${(d.markdown.length/1024).toFixed(1)}KB，${eng}`;
    if (d.creditsUsed) s += `，-${d.creditsUsed} credit`;
    if (d.creditsRemaining!=null) s += `，余${d.creditsRemaining}`;
    s += '）';
    show(s, 'success');
    $('result').classList.add('show');
    $('meta').textContent = `${(d.markdown.length/1024).toFixed(1)} KB`;
    renderTab();
    loadQuota();
  } catch(e) {
    timers.forEach(clearTimeout);
    show(e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '抓取';
  }
}

function switchTab(t, el) {
  tab = t;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  renderTab();
}

function renderTab() {
  if (!D) return;
  const area = $('previewArea');
  if (tab === 'preview') {
    area.classList.remove('source');
    let html = marked.parse(D.markdown);
    // Proxy ALL external images through server to bypass hotlink protection
    html = html.replace(/<img\s+src="(https?:\/\/[^"]+)"/g, (m, url) =>
      `<img src="/api/scraper/imgproxy?url=${encodeURIComponent(url)}"`);
    area.innerHTML = html;
  } else {
    area.classList.add('source');
    area.textContent = D.markdown;
  }
}

async function copyMd() {
  if (!D) return;
  try { await navigator.clipboard.writeText(D.markdown); show('已复制','success'); }
  catch { const t=document.createElement('textarea'); t.value=D.markdown; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); show('已复制','success'); }
}

async function saveToServer() {
  if (!D) return show('请先抓取','error');
  const fmt = $('saveFormat').value;
  const dir = $('saveDirInput').value.trim();
  const btn = $('saveBtn'); btn.disabled=true; btn.textContent='保存中...';
  try {
    if (fmt==='html') {
      show('<span class="spinner"></span> 下载图片并生成 HTML...','loading');
      const exp = await api('/api/scraper/export-html', {markdown:D.markdown, title:D.title});
      const sav = await api('/api/scraper/save-html', {html:exp.html, title:D.title, saveDir:dir});
      show(`已保存：${sav.filepath}`, 'success');
    } else {
      const d = await api('/api/scraper/save', {markdown:D.markdown, title:D.title, saveDir:dir});
      let m = `已保存：${d.filepath}`;
      if (d.imageCount) m += `（${d.imageCount} 张图片）`;
      show(m, 'success');
    }
  } catch(e) { show('保存失败：'+e.message,'error'); }
  finally { btn.disabled=false; btn.textContent='保存到服务器'; }
}

async function downloadLocal() {
  if (!D) return show('请先抓取','error');
  const fmt = $('saveFormat').value;
  if (fmt==='html') {
    show('<span class="spinner"></span> 生成 HTML...','loading');
    try {
      const d = await api('/api/scraper/export-html', {markdown:D.markdown, title:D.title});
      dl(d.html, d.filename, 'text/html');
      show(`已下载 ${d.filename}`,'success');
    } catch(e) { show('导出失败：'+e.message,'error'); }
  } else {
    dl(D.markdown, (D.title||'article')+'.md', 'text/markdown');
    show('已下载 .md','success');
  }
}

function dl(content, name, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type:type+';charset=utf-8'}));
  a.download = name; a.click(); URL.revokeObjectURL(a.href);
}

$('urlInput').addEventListener('keydown', e => { if(e.key==='Enter') scrape(); });
loadQuota();
</script>
</body>
</html>
