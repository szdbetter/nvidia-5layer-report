<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #f5f7fb; }
    .wechat-article {
      max-width: 720px;
      margin: 0 auto;
      padding: 28px 20px 56px;
      color: #1f2937;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      line-height: 1.85;
      letter-spacing: 0.02em;
    }
    .wechat-article .sheet {
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      padding: 36px 24px;
    }
    .wechat-article h1 {
      font-size: 30px;
      line-height: 1.35;
      margin: 0 0 18px;
      color: #0f172a;
      text-align: center;
      letter-spacing: 0.01em;
    }
    .wechat-article h2 {
      font-size: 22px;
      line-height: 1.45;
      margin: 38px 0 18px;
      color: #0f172a;
      padding-left: 14px;
      border-left: 4px solid #2563eb;
      background: linear-gradient(90deg, rgba(37,99,235,0.08), rgba(37,99,235,0));
    }
    .wechat-article h3 {
      font-size: 18px;
      margin: 26px 0 12px;
      color: #1d4ed8;
    }
    .wechat-article p {
      margin: 12px 0;
      font-size: 16px;
      color: #1f2937;
    }
    .wechat-article strong {
      color: #111827;
      font-weight: 700;
    }
    .wechat-article blockquote {
      margin: 18px 0;
      padding: 14px 16px;
      border-left: 4px solid #60a5fa;
      background: #eff6ff;
      color: #1e3a8a;
      border-radius: 8px;
    }
    .wechat-article ul, .wechat-article ol {
      margin: 14px 0;
      padding-left: 26px;
    }
    .wechat-article li {
      margin: 8px 0;
      font-size: 16px;
    }
    .wechat-article hr {
      border: none;
      height: 1px;
      background: linear-gradient(90deg, rgba(148,163,184,0), rgba(148,163,184,0.9), rgba(148,163,184,0));
      margin: 28px 0;
    }
    .wechat-article pre {
      margin: 18px 0;
      padding: 16px;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 12px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.65;
    }
    .wechat-article code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    .wechat-article p code, .wechat-article li code {
      background: #eff6ff;
      color: #1d4ed8;
      padding: 2px 6px;
      border-radius: 6px;
    }
    .wechat-article img {
      width: 100%;
      max-width: 100%;
      border-radius: 14px;
      margin: 18px 0;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
    }
    .wechat-article .meta {
      text-align: center;
      color: #64748b;
      font-size: 13px;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div class="wechat-article">
    <div class="sheet">
      <h1>{{ title }}</h1>
      {% if author %}<div class="meta">作者：{{ author }}</div>{% endif %}
      {{ body_html | safe }}
    </div>
  </div>
</body>
</html>
